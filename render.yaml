services:
  - type: web
    name: mjm-mill-ffb-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false

  - type: static
    name: mjm-mill-ffb-web
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://mjm-mill-ffb-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
